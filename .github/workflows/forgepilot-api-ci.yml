name: ForgePilot API CI

on:
  push:
    branches:
      - main
      - forgepilot/backend-omega-native
    paths:
      - "forgepilot-api/**"
      - ".github/workflows/forgepilot-api-ci.yml"
  pull_request:
    paths:
      - "forgepilot-api/**"
      - ".github/workflows/forgepilot-api-ci.yml"

jobs:
  sentinels:
    name: Architecture Sentinels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./forgepilot-api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify sentinel count (meta-sentinel)
        working-directory: ./forgepilot-api
        run: |
          COUNT=$(python -m pytest --co -q -m sentinel 2>&1 | grep -c "::" || true)
          echo "Sentinel count: $COUNT"
          if [ "$COUNT" -lt 24 ]; then
            echo "SENTINEL SUITE TOO SMALL: found $COUNT, expected >= 24"
            echo "Sentinels may have been deleted. No merge until count is restored."
            exit 1
          fi

      - name: Run architecture sentinels
        working-directory: ./forgepilot-api
        run: |
          python -m pytest -m sentinel -v --no-header --tb=short

  test:
    name: Test
    needs: [sentinels]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ./forgepilot-api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: ./forgepilot-api
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./forgepilot-api/coverage.xml
          flags: forgepilot-api
          name: forgepilot-api-${{ matrix.python-version }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./forgepilot-api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Black
        working-directory: ./forgepilot-api
        run: black --check app/ tests/

      - name: Run Ruff
        working-directory: ./forgepilot-api
        run: ruff check app/ tests/

      - name: Run MyPy
        working-directory: ./forgepilot-api
        run: mypy app/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./forgepilot-api
        run: |
          docker build -t forgepilot-api:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d --name test-api -p 8000:8000 \
            -e FEDERATION_URL=http://mock:3000 \
            forgepilot-api:${{ github.sha }}
          sleep 5
          docker exec test-api curl -f http://localhost:8000/health || exit 1
          docker stop test-api
          docker rm test-api
