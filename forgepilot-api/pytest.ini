[pytest]
minversion = 7.4
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    -ra
    --junitxml=junit.xml
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --cov-report=json:coverage.json
markers =
    asyncio: mark test as async
    integration: mark test as integration test requiring live federation_core
    unit: mark test as unit test (fast, isolated)
    contract: mark test as contract test (API schema validation)
    contracts: mark test as contract test (API schema validation)
    e2e: mark test as end-to-end workflow test
    genesis: mark test as Genesis Protocol test
    slow: mark test as slow (>30 seconds)
