[pytest]
minversion = 7.4
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    -ra
    --cov=app
    --cov-report=term-missing
    --cov-report=html
markers =
    asyncio: mark test as async
    integration: mark test as integration test
    unit: mark test as unit test
    contract: mark test as contract test
